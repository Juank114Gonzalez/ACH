name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install backend deps and run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ach_test
        run: |
          npm ci
          npx prisma migrate deploy
          npx prisma db seed
      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ach_test
          JWT_ACCESS_SECRET: test-access-secret-at-least-32-chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-chars-long
          CORS_ORIGIN: http://localhost:3000
          NODE_ENV: test
        run: |
          npm run build
          node dist/server.js &
          npx wait-on http://localhost:4000/api/v1/health
      - name: Install frontend deps and start
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
        run: |
          npm ci
          npm run build
          npm start &
          npx wait-on http://localhost:3000
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
