# Render — monorepo: build from repo root, run only the backend workspace
services:
  - type: web
    name: ach-backend
    runtime: node
    plan: free
    buildCommand: npm ci --include-workspace-root=false -w ach-backend && npm exec -w ach-backend -- prisma migrate deploy && npm run build -w ach-backend
    startCommand: npm run start -w ach-backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: LOG_LEVEL
        value: info
